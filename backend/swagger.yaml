swagger: "2.0"
info:
  title: Medbratishka API Models
  version: "1.0.0"

consumes:
  - application/json
produces:
  - application/json

paths:
  /auth/register:
    post:
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        "201":
          description: created
          schema:
            $ref: "#/definitions/AuthResponse"
  /auth/login:
    post:
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/AuthResponse"
  /auth/logout:
    post:
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/SuccessResponse"
  /clinics/{clinic_id}/doctors/{doctor_id}/bind:
    post:
      parameters:
        - name: clinic_id
          in: path
          required: true
          type: integer
          format: int64
        - name: doctor_id
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/SuccessResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "401":
          description: unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
        "403":
          description: forbidden
          schema:
            $ref: "#/definitions/ErrorResponse"
        "404":
          description: not found
          schema:
            $ref: "#/definitions/ErrorResponse"
  /doctors/me/code:
    put:
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/DoctorCodeRequest"
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/DoctorCodeResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "401":
          description: unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
        "404":
          description: not found
          schema:
            $ref: "#/definitions/ErrorResponse"
  /patients/me/bind-doctor:
    post:
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/DoctorCodeRequest"
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/SuccessResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "401":
          description: unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
        "404":
          description: not found
          schema:
            $ref: "#/definitions/ErrorResponse"
  /chats:
    get:
      parameters:
        - name: limit
          in: query
          type: integer
          default: 50
        - name: offset
          in: query
          type: integer
          default: 0
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/PaginatedChatsResponse"
    post:
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateChatRequest"
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/ChatResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "403":
          description: forbidden
          schema:
            $ref: "#/definitions/ErrorResponse"
  /chats/{chat_id}:
    delete:
      parameters:
        - name: chat_id
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/SuccessResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "403":
          description: forbidden
          schema:
            $ref: "#/definitions/ErrorResponse"
        "404":
          description: not found
          schema:
            $ref: "#/definitions/ErrorResponse"
  /chats/{chat_id}/messages:
    get:
      parameters:
        - name: chat_id
          in: path
          required: true
          type: integer
          format: int64
        - name: limit
          in: query
          type: integer
          default: 50
        - name: offset
          in: query
          type: integer
          default: 0
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/PaginatedChatMessagesResponse"
    post:
      parameters:
        - name: chat_id
          in: path
          required: true
          type: integer
          format: int64
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ChatMessageRequest"
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/ChatMessageResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "403":
          description: forbidden
          schema:
            $ref: "#/definitions/ErrorResponse"
  /chats/{chat_id}/messages/{message_id}:
    delete:
      parameters:
        - name: chat_id
          in: path
          required: true
          type: integer
          format: int64
        - name: message_id
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/SuccessResponse"
        "400":
          description: bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        "403":
          description: forbidden
          schema:
            $ref: "#/definitions/ErrorResponse"
        "404":
          description: not found
          schema:
            $ref: "#/definitions/ErrorResponse"

definitions:
  RegisterRequest:
    type: object
    required:
      - login
      - email
      - password
      - first_name
      - last_name
      - role
    properties:
      login:
        type: string
        minLength: 3
        maxLength: 50
        example: doctor.ivanov
      email:
        type: string
        format: email
        example: ivanov@clinic.com
      phone:
        type: string
        example: "+79991234567"
      password:
        type: string
        minLength: 8
        maxLength: 128
        example: SecurePass123!
      first_name:
        type: string
        example: Иван
      last_name:
        type: string
        example: Иванов
      middle_name:
        type: string
        example: Иванович
      role:
        type: string
        enum:
          - admin
          - doctor
          - patient
        example: doctor

  LoginRequest:
    type: object
    required:
      - access_parameter
      - password
    properties:
      access_parameter:
        type: string
        example: ivanov@clinic.com
      password:
        type: string
        example: SecurePass123!

  TokenResponse:
    type: object
    properties:
      token:
        type: string
      expires_at:
        type: integer
        format: int64
        example: 1712973600000
      type:
        type: string
        example: Bearer

  UserResponse:
    type: object
    properties:
      id:
        type: integer
        format: int64
        example: 1
      login:
        type: string
        example: doctor.ivanov
      email:
        type: string
        example: ivanov@clinic.com
      phone:
        type: string
        example: "+79991234567"
      role:
        type: string
        enum:
          - admin
          - doctor
          - patient
      is_verified:
        type: boolean
        example: false
      first_name:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      created_at:
        type: integer
        format: int64
      updated_at:
        type: integer
        format: int64

  AuthResponse:
    type: object
    properties:
      access_token:
        $ref: "#/definitions/TokenResponse"
      refresh_token:
        $ref: "#/definitions/TokenResponse"
      server_time:
        type: integer
        format: int64
      user:
        $ref: "#/definitions/UserResponse"

  ErrorResponse:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      type:
        type: string
      details:
        type: object
        additionalProperties: true

  SuccessResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      message:
        type: string
        example: operation completed successfully

  DoctorCodeRequest:
    type: object
    required:
      - doctor_code
    properties:
      doctor_code:
        type: string
        minLength: 3
        maxLength: 128
        example: DR-ABCD-1234

  DoctorCodeResponse:
    type: object
    properties:
      doctor_code:
        type: string
        example: DR-ABCD-1234

  CreateChatRequest:
    type: object
    required:
      - doctor_id
    properties:
      doctor_id:
        type: integer
        format: int64

  ChatMessageRequest:
    type: object
    properties:
      content:
        type: string
        minLength: 1
      attachment_base64:
        type: string
        description: Base64 payload of image/audio file (optional)
      attachment_name:
        type: string
        description: Original filename for attachment
      attachment_mime_type:
        type: string
        description: MIME type (image/* or audio/*)
      attachment_type:
        type: string
        enum:
          - image
          - audio

  ChatMessageResponse:
    type: object
    properties:
      id:
        type: integer
        format: int64
      sender_id:
        type: integer
        format: int64
      sender_name:
        type: string
      content:
        type: string
      attachment_url:
        type: string
      attachment_type:
        type: string
      attachment_mime_type:
        type: string
      created_at:
        type: integer
        format: int64

  ChatResponse:
    type: object
    properties:
      id:
        type: integer
        format: int64
      doctor_id:
        type: integer
        format: int64
      patient_id:
        type: integer
        format: int64
      other_user_id:
        type: integer
        format: int64
      other_login:
        type: string
      other_name:
        type: string
      updated_at:
        type: integer
        format: int64

  ChatsResponse:
    type: object
    properties:
      chats:
        type: array
        items:
          $ref: "#/definitions/ChatResponse"

  ChatMessagesResponse:
    type: object
    properties:
      messages:
        type: array
        items:
          $ref: "#/definitions/ChatMessageResponse"

  PaginationResponse:
    type: object
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
        format: int64

  PaginatedChatsResponse:
    type: object
    properties:
      items:
        type: array
        items:
          $ref: "#/definitions/ChatResponse"
      pagination:
        $ref: "#/definitions/PaginationResponse"

  PaginatedChatMessagesResponse:
    type: object
    properties:
      items:
        type: array
        items:
          $ref: "#/definitions/ChatMessageResponse"
      pagination:
        $ref: "#/definitions/PaginationResponse"
