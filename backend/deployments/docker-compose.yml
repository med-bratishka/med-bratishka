services:
  postgres:
    image: postgres:15.12
    container_name: medbratishka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medbratishka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medbratishka"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: medbratishka-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: medbratishka-minio-mc
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo 'waiting for minio...'
          sleep 2
        done
        mc mb --ignore-existing local/medbratishka
        if ! mc anonymous set public local/medbratishka; then
          echo 'bucket policy already set or unsupported, continue'
        fi

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: medbratishka-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-mc:
        condition: service_completed_successfully
    environment:
      APP_ENV: local
      CONFIG_PATH: /app/configs/local.json
    ports:
      - "8080:8080"
    volumes:
      - ../configs:/app/configs:ro

volumes:
  postgres_data:
  minio_data:
